name: Run Daily Job Search

on:
  # Se déclenche tous les jours à 8h du matin (heure UTC)
  schedule:
    - cron: '0 8 * * *'
  # Permet aussi de le lancer manuellement depuis l'onglet "Actions" de GitHub
  workflow_dispatch:

jobs:
  build-and-run:
    # Utilise la dernière version stable d'Ubuntu comme machine virtuelle
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code de votre dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Configurer Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Assurez-vous que cette version est cohérente

      # Étape 3 : Installer les dépendances (VERSION MISE À JOUR)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download fr_core_news_sm
          # Commande cruciale pour installer Playwright et ses dépendances de navigateur
          playwright install --with-deps

      # Étape 4 : Exécuter le script de recherche quotidienne
      - name: Run daily job search script
        run: python run_daily_jobs.py
        env:
          # On passe les secrets au script via les variables d'environnement
          # Ces secrets doivent être configurés dans les paramètres de votre dépôt GitHub
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
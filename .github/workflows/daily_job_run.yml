name: Run Daily Job Search

on:
  # Se déclenche tous les jours à 8h du matin (UTC)
  schedule:
    - cron: '0 8 * * *'
  # Permet aussi de le lancer manuellement depuis l'onglet "Actions" de GitHub
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code de votre dépôt
      - name: Checkout repository
        uses: actions/checkout@v3

      # Étape 2 : Configurer Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Assurez-vous que la version correspond à la vôtre

      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Étape 4 : Exécuter le script de recherche quotidienne
      - name: Run daily job search script
        run: python run_daily_jobs.py
        env:
          # On passe les secrets au script via les variables d'environnement
          # Ces secrets doivent être configurés dans les paramètres de votre dépôt GitHub
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}